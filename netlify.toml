[build]
  publish = "."

[[redirects]]
  from = "/signup"
  to = "/.netlify/functions/gcp-signup"
  status = 200
  force = true
  conditions = { Method = ["POST"] }

[[redirects]]
  from = "/login"
  to = "/.netlify/functions/gcp-login"
  status = 200
  force = true
  conditions = { Method = ["POST"] }

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), geolocation=(), microphone=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/signup"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/login"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/signup.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/login.html"
  [headers.values]
    Cache-Control = "no-store"