<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - DCPO ServiceNow on Google Cloud | Bynet</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #10202b;
      --muted: #5a6b77;
      --border: #d9e2ea;
      --accent: #0a3622;
      --link: #1a73e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef4f2 0%, var(--bg) 220px);
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 72px;
    }
    .nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .nav a {
      color: var(--link);
      text-decoration: none;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: var(--accent);
    }
    p {
      line-height: 1.7;
      color: var(--muted);
      font-size: 15px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text);
      background: #fff;
    }
    .btn.primary {
      background: var(--link);
      border-color: var(--link);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="/">Home</a>
      <a href="/signup">Signup</a>
      <a href="/login">Login</a>
      <a href="/docs/">Docs</a>
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
    </div>
    <div class="card">
      <h1>Contact</h1>
      <p>For sales, onboarding, or support questions related to the DCPO ServiceNow on Google Cloud offering, use the contact options below.</p>
      <p>Email: <a href="mailto:servicenow@bynet.co.il">servicenow@bynet.co.il</a></p>
      <div class="actions">
        <a class="btn primary" href="mailto:servicenow@bynet.co.il">Email Bynet</a>
        <a class="btn" href="/signup">Open Signup</a>
        <a class="btn" href="/login">Open Login</a>
      </div>
    </div>
  </div>
</body>
</html>
